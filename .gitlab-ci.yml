include:
  - template: Terraform/Base.gitlab-ci.yml  # Includes Terraform boilerplate
  - template: Jobs/SAST-IaC.gitlab-ci.yml   # Includes security analysis templates

stages:
  - validate
  - test
  - build
  - deploy
  - deploy_fargate
  - cleanup
  - package
  - build_cli
  - destroy

variables:
  AWS_REGION: "us-east-2"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      variables:
        TF_STATE_NAME: "development-deployment"
      when: always
    - if: '$CI_COMMIT_BRANCH == "prod" && $CI_PIPELINE_SOURCE == "push"'
      variables:
        TF_STATE_NAME: "production-deployment"
      when: always
    - when: never

fmt:
  extends: .terraform:fmt
  needs: []

validate:
  extends: .terraform:validate
  needs: []

# Consolidated Terraform Deployment
deploy:
  image:
    name: hashicorp/terraform:1.5.0
    entrypoint: [""]
  stage: deploy
  variables:
    TF_VAR_env: $TF_STATE_NAME
    S3_BUCKET: "ndnp-open-ocr-dependencies"
    TF_STATE_KEY: "env:/ndnp-open-ocr-${TF_STATE_NAME}/ndnp-open-ocr-tf-state-files/dev/terraform.tfstate"
  extends: .terraform:deploy
  before_script:
    - terraform init -force-copy
    - terraform workspace select ndnp-open-ocr-$TF_STATE_NAME || terraform workspace new ndnp-open-ocr-$TF_STATE_NAME
  script:
    - terraform apply -input=false -auto-approve
    - export ECR_REPO_URI=$(terraform output -raw ecr_repo_url)
  artifacts:
    when: always

# Docker Build and Push for Fargate Deployment
deploy_fargate:
  image: docker:latest
  services:
    - docker:24.0.2-dind
  stage: deploy_fargate
  dependencies:
    - deploy
  before_script:
    - apk add --no-cache curl jq python3 py3-pip
    - python3 -m venv /tmp/venv
    - . /tmp/venv/bin/activate
    - pip install awscli
    - export AWS_REGION=${AWS_REGION:-"us-east-2"}
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 342134162356.dkr.ecr.us-east-2.amazonaws.com
    - docker build --platform linux/amd64 -t ndnp_open_ocr:latest ./packages/ndnp_open_ocr
    - docker tag ndnp_open_ocr:latest 342134162356.dkr.ecr.us-east-2.amazonaws.com/ndnp-open-ocr-container-repo-${TF_STATE_NAME}:latest
    - docker push 342134162356.dkr.ecr.us-east-2.amazonaws.com/ndnp-open-ocr-container-repo-${TF_STATE_NAME}:latest
  environment:
    name: $TF_STATE_NAME

# Python CLI Build Job
build_cli:
  image: python:3.9
  stage: build_cli
  variables:
    OUTPUT_BUCKET_NAME: "ndnp-open-ocr-output-bucket-${TF_STATE_NAME}"
    SCHEDULER_ARN: "arn:aws:lambda:us-east-2:420280634985:function:ndnp-open-ocr-scheduler-lambda-function-${TF_STATE_NAME}"
    GET_JOB_ARN: "arn:aws:lambda:us-east-2:420280634985:function:ndnp-open-ocr-get-job-lambda-function-${TF_STATE_NAME}"
  script:
    - pip install poetry
    - cd packages/cli/
    # Inject stage-specific variables into a config file
    - echo "OUTPUT_BUCKET_NAME = '${OUTPUT_BUCKET_NAME}'" >> config.py
    - echo "SCHEDULER_ARN = '${SCHEDULER_ARN}'" >> config.py
    - echo "GET_JOB_ARN = '${GET_JOB_ARN}'" >> config.py
    - poetry build
    - poetry config http-basic.gitlab-ci-token ${CI_JOB_TOKEN} gitlab-ci-token
    - poetry config repositories.gitlab ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
    # Publish the package to the GitLab Package Registry. The deployment process currently requires manual installation and upgrading
    # of the deployed CLI tool on NDNPQR. This will be automated in the future.
    # To install the latest package on NDNPQR after it has been published with the line below, I simply run
    # pip install --upgrade
    - poetry publish --repository gitlab --username gitlab-ci-token --password ${CI_JOB_TOKEN}

destroy:
  stage: destroy
  script:
    - terraform destroy -auto-approve
  dependencies:
    - deploy
  when: manual
