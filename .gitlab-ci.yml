image: python:3.9

run:
  script:
    - pip install poetry
    - cd packages/cli/

    # Continue with the build and publish process
    - poetry build
    - poetry config http-basic.gitlab-ci-token ${CI_JOB_TOKEN} gitlab-ci-token
    - poetry config repositories.gitlab ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
    - poetry publish --repository gitlab --username gitlab-ci-token --password ${CI_JOB_TOKEN}

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "development"'
      changes:
        - packages/cli/**/*  # Assuming your CLI directory is packages/cli
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
      changes:
        - packages/cli/**/*  # Assuming your CLI directory is packages/cli